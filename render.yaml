services:
  - type: web
    name: fortune-teller-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: HFT
        sync: false
      - key: CLOUDNARY_NAME
        sync: false
      - key: CLOUDNARY_API_KEY
        sync: false
      - key: CLOUDNARY_SECRET_KEY
        sync: false
      - key: IPGL_API_KEY
        sync: false
